<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Screener</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 520px;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        textarea {
            height: 120px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #0f172a;
            white-space: pre-line;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚀 AI Resume Screener</h2>

    <input type="file" id="resume" accept=".pdf">
    <textarea id="jd" placeholder="Paste Job Description"></textarea>

    <button id="btn">Analyze Resume</button>

    <div id="output" class="result"></div>
</div>

<!-- IMPORTANT: only one script -->
<script src="script.js"></script>

</body>
</html>
